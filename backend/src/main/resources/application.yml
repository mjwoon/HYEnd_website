spring:
  profiles:
    active: dev
  application:
    name: hyend
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}

# 파일 저장소 설정
file:
  storage:
    type: ${FILE_STORAGE_TYPE:local}      # local | s3
    local:
      upload-dir: ./uploads
    s3:
      bucket: ${AWS_S3_BUCKET:}
      region: ${AWS_S3_REGION:ap-northeast-2}
  allowed-extensions: jpg,jpeg,png,gif,pdf,docx,xlsx,pptx,hwp,zip
  max-file-count: 5                       # 요청당 최대 파일 수

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

logging:
  level:
    root: INFO
    com.hyend: DEBUG
    org.springframework.security: DEBUG
